<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Find the Sparkly Star!</title>
  <style>
    :root{
      --bg1:#fff0f8;
      --bg2:#eef7ff;
      --ink:#1f2937;
      --card:rgba(255,255,255,.85);
      --shadow: 0 14px 34px rgba(0,0,0,.12);
      --radius: 22px;
      --pink1:#ff4d8d;
      --pink2:#ff85b3;
      --lav:#c084fc;
      --mint:#5eead4;
      --sun:#fbbf24;

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--ink);
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(1100px 700px at 20% 20%, var(--bg1), transparent 55%),
        radial-gradient(1100px 700px at 80% 30%, var(--bg2), transparent 55%),
        linear-gradient(120deg, #fff, #f7fbff);
      overflow:hidden;
    }
    .confetti{ position:fixed; inset:0; pointer-events:none; display:none; }
    .wrap{ width:min(980px, 92vw); padding:20px; }
    .card{
      background:var(--card);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.65);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      padding:20px;
    }
    .top{
      display:flex;
      gap:16px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-size:clamp(22px, 3.2vw, 36px);
      letter-spacing:.2px;
    }
    .sub{
      margin:6px 0 0;
      font-size:14px;
      opacity:.85;
      line-height:1.3;
    }
    .btns{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    button{
      border:0;
      border-radius:999px;
      padding:10px 14px;
      background:#111827;
      color:white;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(17,24,39,.22);
      transition:transform .06s ease;
    }
    button:active{ transform: translateY(1px) }
    .mini{
      border-radius:999px;
      padding:10px 12px;
      background:#ffffffb8;
      border:1px solid rgba(0,0,0,.06);
      box-shadow:0 6px 14px rgba(0,0,0,.06);
      font-size:14px;
    }
    .meterWrap{
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

      height:12px;

      background:rgba(17,24,39,.08);
      overflow:hidden;
      border:1px solid rgba(0,0,0,.06);
    }

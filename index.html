<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magic Spell Gender Reveal 🪄</title>
  <style>
    :root{
      --bg1:#fff0f8;
      --bg2:#eef7ff;
      --ink:#1f2937;
      --card:rgba(255,255,255,.86);
      --shadow: 0 14px 34px rgba(0,0,0,.12);
      --radius: 22px;

      --pink:#ff4d8d;
      --lav:#c084fc;
      --mint:#5eead4;
      --sun:#fbbf24;
      --night:#111827;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--ink);
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(1100px 700px at 20% 20%, var(--bg1), transparent 55%),
        radial-gradient(1100px 700px at 80% 30%, var(--bg2), transparent 55%),
        linear-gradient(120deg, #fff, #f7fbff);
      overflow:hidden;
    }
    .confetti{ position:fixed; inset:0; pointer-events:none; display:none; }

    .wrap{ width:min(980px, 92vw); padding:20px; }
    .card{
      background:var(--card);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.65);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      padding:20px;
    }
    h1{
      margin:0;
      font-size:clamp(22px, 3.2vw, 36px);
      letter-spacing:.2px;
    }
    .sub{ margin:6px 0 0; font-size:14px; opacity:.86; line-height:1.35; }

    .row{
      margin-top:16px;
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:16px;
      align-items:stretch;
    }
    @media (max-width:860px){ .row{ grid-template-columns: 1fr; } }

    .panel{
      border-radius:18px;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
      box-shadow: 0 10px 22px rgba(0,0,0,.08);
      padding:16px;
    }

    .ingredients{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:12px;
      margin-top:10px;
    }
    @media (max-width:480px){ .ingredients{ grid-template-columns: repeat(2, minmax(0,1fr)); } }

    .chip{
      position:relative;
      border-radius:16px;
      border:1px solid rgba(0,0,0,.08);
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.8), transparent 40%),
        linear-gradient(160deg, rgba(255,77,141,.18), rgba(192,132,252,.14), rgba(94,234,212,.14));
      box-shadow: 0 10px 18px rgba(0,0,0,.08);
      padding:14px 12px;
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      transition: transform .08s ease;
    }
    .chip:active{ transform: scale(.99) }
    .chip .emoji{ font-size:28px; filter: drop-shadow(0 8px 10px rgba(0,0,0,.10)); }
    .chip .name{ font-weight:900; font-size:14px; }
    .chip .tap{ font-size:12px; opacity:.75; font-weight:800; }

    .cauldronWrap{
      height:100%;
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
      border-radius:16px;
      background:
        radial-gradient(500px 260px at 50% 65%, rgba(255,77,141,.18), transparent 65%),
        radial-gradient(520px 260px at 40% 55%, rgba(192,132,252,.16), transparent 60%),
        linear-gradient(180deg, #ffffff, #fff7fb);
    }

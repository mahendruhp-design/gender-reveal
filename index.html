<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magic Spell Gender Reveal 🪄</title>
  <style>
    :root{
      --bg1:#fff0f8;
      --bg2:#eef7ff;
      --ink:#1f2937;
      --card:rgba(255,255,255,.88);
      --shadow: 0 14px 34px rgba(0,0,0,.12);
      --radius: 22px;

      --pink:#ff4d8d;
      --lav:#c084fc;
      --mint:#5eead4;
      --sun:#fbbf24;
      --night:#111827;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--ink);
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(1100px 700px at 20% 20%, var(--bg1), transparent 55%),
        radial-gradient(1100px 700px at 80% 30%, var(--bg2), transparent 55%),
        linear-gradient(120deg, #fff, #f7fbff);
      overflow:hidden;
    }
    .confetti{ position:fixed; inset:0; pointer-events:none; display:none; }

    .wrap{ width:min(980px, 92vw); padding:20px; }
    .card{
      background:var(--card);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.65);
